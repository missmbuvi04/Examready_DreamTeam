services:
  db:
    image: mysql:8.0
    container_name: myapp-mysql
    restart: always
    environment:
      - MYSQL_DATABASE=myapp_dev
      - MYSQL_USER=myapp_user
      - MYSQL_PASSWORD=myapp_password
      - MYSQL_ROOT_PASSWORD=rootpassword  
    ports:
      - "3308:3306"  
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./examready-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=db  # service name as hostname
      - DB_PORT=3306
      - DB_NAME=myapp_dev
      - DB_USER=myapp_user
      - DB_PASSWORD=myapp_password
      - DB_DIALECT=mysql  
    volumes:
      - ./examready-backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy  # wait for MySQL to be ready

  frontend:
    build: ./examready-frontend
    ports:
      - "3000:3000"

    user: root  
    depends_on:
      - backend
    volumes:
      - ./examready-frontend:/app
      - /app/node_modules

volumes:
  mysql_data: 