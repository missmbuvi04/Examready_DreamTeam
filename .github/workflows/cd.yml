name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  ci-checks:
    name: Run CI Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examready-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (Backend)
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test || true

      - name: Run linting
        run: npm run lint || true

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: ci-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build backend image
        working-directory: ./examready-backend
        run: docker build -t examready-backend:latest .

      - name: Build frontend image
        working-directory: ./examready-frontend
        run: docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t examready-frontend:latest .

      - name: Tag and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag examready-backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG
          docker tag examready-backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:backend-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-latest

      - name: Tag and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag examready-frontend:latest $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG
          docker tag examready-frontend:latest $ECR_REGISTRY/$ECR_REPOSITORY:frontend-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install Ansible and SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible openssh-client

      - name: Write SSH keys and config
        run: |
          mkdir -p ~/.ssh

          # Write keys
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/app_key
          chmod 600 ~/.ssh/bastion_key ~/.ssh/app_key

          # Write SSH config - this handles the ProxyJump cleanly
          # avoids all quoting issues in ansible inventory
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ secrets.BASTION_IP }}
            User ec2-user
            IdentityFile ~/.ssh/bastion_key
            StrictHostKeyChecking no
            ServerAliveInterval 60

          Host appserver
            HostName ${{ secrets.APP_PRIVATE_IP }}
            User ec2-user
            IdentityFile ~/.ssh/app_key
            ProxyJump bastion
            StrictHostKeyChecking no
            ServerAliveInterval 60
          EOF
          chmod 600 ~/.ssh/config

      - name: Test bastion connection
        run: ssh bastion "echo bastion_ok"

      - name: Test app server connection
        run: ssh appserver "echo appserver_ok"

      - name: Create Ansible inventory
        run: |
          # Use environment variables so secrets expand correctly
          # Do NOT use single-quoted heredoc (<< 'EOF') as it blocks expansion
          cat > ansible/inventory.yml << EOF
          all:
            vars:
              ansible_user: ec2-user
              ansible_ssh_private_key_file: ~/.ssh/app_key
              ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ProxyCommand='ssh -W %h:%p -i ~/.ssh/bastion_key -o StrictHostKeyChecking=no ec2-user@${{ secrets.BASTION_IP }}'"
              ecr_registry: "${{ secrets.ECR_REGISTRY }}"
              db_host: "${{ secrets.RDS_ENDPOINT }}"
              db_name: "${{ secrets.DB_NAME }}"
              db_user: "${{ secrets.DB_USER }}"
              db_password: "${{ secrets.DB_PASSWORD }}"
              db_root_password: "${{ secrets.DB_ROOT_PASSWORD }}"
              aws_access_key_id: "${{ secrets.AWS_ACCESS_KEY_ID }}"
              aws_secret_access_key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
              aws_region: "eu-north-1"
              bastion_ip: "${{ secrets.BASTION_IP }}"
              app_private_ip: "${{ secrets.APP_PRIVATE_IP }}"
              bastion_key: "~/.ssh/bastion_key"

            children:
              app:
                hosts:
                  app_server:
                    ansible_host: "${{ secrets.APP_PRIVATE_IP }}"
                    ansible_python_interpreter: /usr/bin/python3.9
          EOF

      - name: Verify inventory was written correctly
        run: |
          echo "=== Inventory file contents ==="
          cat ansible/inventory.yml
          echo "=== Checking BASTION_IP is not literal ==="
          if grep -q 'secrets.BASTION_IP' ansible/inventory.yml; then
            echo "ERROR: secrets were not expanded in inventory"
            exit 1
          else
            echo "OK: secrets expanded correctly"
          fi

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/inventory.yml ansible/playbook.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Verify deployment
        run: |
          ssh appserver "docker ps --format 'table {{.Names}}\t{{.Status}}'"
        continue-on-error: true
