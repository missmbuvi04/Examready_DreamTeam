name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci-checks:
    name: Run CI Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examready-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (Backend)
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test || true

      - name: Run linting
        run: npm run lint || true

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: ci-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build backend image
        working-directory: ./examready-backend
        run: docker build -t examready-backend:latest .

      - name: Build frontend image
        working-directory: ./examready-frontend
        run: docker build -t examready-frontend:latest .

      - name: Tag and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: examready-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag examready-backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag examready-backend:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Tag and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: examready-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag examready-frontend:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag examready-frontend:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get Terraform outputs
        working-directory: ./terraform
        run: |
          terraform init
          terraform output -raw bastion_ip > /tmp/bastion_ip.txt
          terraform output -raw app_private_ip > /tmp/app_ip.txt
          terraform output -raw ecr_repo_url > /tmp/ecr_url.txt

      - name: Install Ansible and SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible openssh-client

      - name: Create SSH key file for app
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create bastion SSH key
        run: |
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          chmod 600 ~/.ssh/bastion_key

      - name: Create dynamic inventory
        run: |
          cat > ansible/inventory.yml << 'EOF'
          all:
            vars:
              ansible_user: ec2-user
              ansible_ssh_private_key_file: ~/.ssh/id_rsa
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyCommand="ssh -W %h:%p -i ~/.ssh/bastion_key ec2-user@${{ secrets.BASTION_IP }}"'
              aws_access_key_id: "${{ secrets.AWS_ACCESS_KEY_ID }}"
              aws_secret_access_key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
              aws_region: us-east-1
              ecr_registry: "${{ secrets.ECR_REGISTRY }}"
              db_host: "${{ secrets.RDS_ENDPOINT }}"
              db_name: "${{ secrets.DB_NAME }}"
              db_user: "${{ secrets.DB_USER }}"
              db_password: "${{ secrets.DB_PASSWORD }}"
              db_root_password: "${{ secrets.DB_ROOT_PASSWORD }}"
              bastion_ip: "${{ secrets.BASTION_IP }}"
              app_private_ip: "${{ secrets.APP_PRIVATE_IP }}"
              bastion_key: ~/.ssh/bastion_key

            children:
              app:
                hosts:
                  app_server:
                    ansible_host: "${{ secrets.APP_PRIVATE_IP }}"
          EOF

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/inventory.yml ansible/playbook.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/bastion_key -J ec2-user@${{ secrets.BASTION_IP }} ec2-user@${{ secrets.APP_PRIVATE_IP }} "docker ps"
        continue-on-error: true
