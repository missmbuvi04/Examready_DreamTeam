name: CI Pipeline

on:
  push:
    branches-ignore:
      - 'main'
  pull_request:
    branches:
      - 'main'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examready-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examready-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Jest
        run: npm install --save-dev jest

      - name: Create test folder
        run: mkdir -p __tests__

      - name: Create test file
        run: |
          echo "test('basic test', () => { expect(1+1).toBe(2); });" > __tests__/test.js

      - name: Update package.json
        run: npm pkg set scripts.test="jest"

      - name: Run tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t examready-test .
