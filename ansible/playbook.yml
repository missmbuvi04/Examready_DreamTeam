---
- name: Configure app server
  hosts: app
  become: yes
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3.9

  tasks:
    - name: Check if python3.9 already installed
      raw: test -f /usr/bin/python3.9 && echo "exists" || echo "missing"
      register: py39_check
      changed_when: false

    - name: Install Python3.9 dependencies
      raw: sudo yum install -y gcc openssl-devel bzip2-devel libffi-devel zlib-devel
      when: "'missing' in py39_check.stdout"

    - name: Download Python 3.9
      raw: curl -O https://www.python.org/ftp/python/3.9.18/Python-3.9.18.tgz
      when: "'missing' in py39_check.stdout"

    - name: Extract Python 3.9
      raw: tar xzf Python-3.9.18.tgz
      when: "'missing' in py39_check.stdout"

    - name: Build and install Python 3.9
      raw: cd Python-3.9.18 && sudo ./configure --enable-optimizations && sudo make altinstall
      when: "'missing' in py39_check.stdout"

    - name: Link python3.9
      raw: sudo ln -sf /usr/local/bin/python3.9 /usr/bin/python3.9
      when: "'missing' in py39_check.stdout"

    - name: Gather facts
      setup:

    - name: Update all packages
      ansible.builtin.yum:
        name: "*"
        state: latest
        use_backend: yum

    - name: Install required system packages
      ansible.builtin.yum:
        name:
          - git
          - curl
          - wget
          - python3
          - python3-pip
          - aws-cli
        state: present
        use_backend: yum

    - name: Install Docker
      ansible.builtin.yum:
        name: docker
        state: present
        use_backend: yum

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Install Docker Compose
      ansible.builtin.get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Install Node.js and npm
      ansible.builtin.yum:
        name:
          - nodejs
          - npm
        state: present
        use_backend: yum

    - name: Verify Docker is running
      ansible.builtin.command: docker --version
      register: docker_version

    - name: Verify Docker Compose installation
      ansible.builtin.command: docker-compose --version
      register: docker_compose_version

    - name: Print Docker version
      ansible.builtin.debug:
        msg: "Docker version: {{ docker_version.stdout }}"

    - name: Print Docker Compose version
      ansible.builtin.debug:
        msg: "Docker Compose version: {{ docker_compose_version.stdout }}"

    - name: Print Node.js version
      ansible.builtin.shell: node --version
      register: node_version

    - name: Print Node version output
      ansible.builtin.debug:
        msg: "Node.js version: {{ node_version.stdout }}"

    - name: Create .aws directory
      ansible.builtin.file:
        path: /home/ec2-user/.aws
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Configure AWS credentials
      ansible.builtin.copy:
        content: |
          [default]
          aws_access_key_id = {{ aws_access_key_id }}
          aws_secret_access_key = {{ aws_secret_access_key }}
          region = {{ aws_region }}
        dest: /home/ec2-user/.aws/credentials
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Login to Amazon ECR
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
        AWS_DEFAULT_REGION: "{{ aws_region }}"
      no_log: true

    - name: Create docker-compose directory
      ansible.builtin.file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Create .env file for docker-compose
      ansible.builtin.copy:
        content: |
          MYSQL_DATABASE={{ db_name }}
          MYSQL_USER={{ db_user }}
          MYSQL_PASSWORD={{ db_password }}
          MYSQL_ROOT_PASSWORD={{ db_root_password }}
          NODE_ENV=production
          PORT=5000
          DB_HOST={{ db_host }}
          DB_PORT=3306
          DB_DIALECT=mysql
        dest: /home/ec2-user/app/.env
        owner: ec2-user
        group: ec2-user
        mode: '0600'
      no_log: true

    - name: Create docker-compose.yml for production
      ansible.builtin.copy:
        content: |
          version: '3.8'
          services:
            backend:
              image: {{ ecr_registry }}:backend-latest
              restart: always
              ports:
                - "5000:5000"
              environment:
                - NODE_ENV=production
                - PORT=5000
                - DB_HOST={{ db_host }}
                - DB_PORT=3306
                - DB_NAME={{ db_name }}
                - DB_USER={{ db_user }}
                - DB_PASSWORD={{ db_password }}
                - DB_DIALECT=mysql
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                interval: 10s
                timeout: 5s
                retries: 5

            frontend:
              image: {{ ecr_registry }}:frontend-latest
              restart: always
              ports:
                - "80:3000"
              environment:
                - NODE_ENV=production
              depends_on:
                - backend
        dest: /home/ec2-user/app/docker-compose.yml
        owner: ec2-user
        group: ec2-user
        mode: '0644'

    - name: Pull latest images from ECR
      ansible.builtin.shell: |
        docker pull {{ ecr_registry }}:backend-latest
        docker pull {{ ecr_registry }}:frontend-latest
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Deploy application with docker-compose
      ansible.builtin.shell: |
        cd /home/ec2-user/app
        docker-compose up -d
      become_user: ec2-user

    - name: Verify deployment
      ansible.builtin.shell: |
        docker ps --format "table {{.Names}}\t{{.Status}}"
      register: docker_status

    - name: Print deployment status
      ansible.builtin.debug:
        msg: "{{ docker_status.stdout }}"
