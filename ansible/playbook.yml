---
- name: Configure app server
  hosts: app
  become: yes
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Gather facts
      setup:

    - name: Update all packages
      ansible.builtin.dnf:
        name: '*'
        state: latest

    - name: Install required system packages
      ansible.builtin.dnf:
        name:
          - git
          - wget
          - python3
          - python3-pip
          - awscli
        state: present

    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Install Docker Compose
      ansible.builtin.get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
        timeout: 120

    - name: Install Node.js from NodeSource
      raw: echo "Node.js is not needed on the server; it's included in Docker containers"

    - name: Verify Docker is running
      ansible.builtin.command: docker --version
      register: docker_version

    - name: Print Docker version
      ansible.builtin.debug:
        msg: "Docker version: {{ docker_version.stdout }}"

    - name: Create .aws directory
      ansible.builtin.file:
        path: /home/ec2-user/.aws
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Configure AWS credentials
      ansible.builtin.copy:
        content: |
          [default]
          aws_access_key_id = {{ aws_access_key_id }}
          aws_secret_access_key = {{ aws_secret_access_key }}
          region = {{ aws_region }}
        dest: /home/ec2-user/.aws/credentials
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Create docker-compose directory
      ansible.builtin.file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Create .env file for docker-compose
      ansible.builtin.copy:
        content: |
          MYSQL_DATABASE={{ db_name }}
          MYSQL_USER={{ db_user }}
          MYSQL_PASSWORD={{ db_password }}
          MYSQL_ROOT_PASSWORD={{ db_root_password }}
          NODE_ENV=production
          PORT=5000
          DB_HOST={{ db_host }}
          DB_PORT=3306
          DB_DIALECT=mysql
        dest: /home/ec2-user/app/.env
        owner: ec2-user
        group: ec2-user
        mode: '0600'
      no_log: true

    - name: Create docker-compose.yml for production
      ansible.builtin.copy:
        content: |
          version: '3.8'
          services:
            backend:
              image: {{ ecr_registry }}/app-repo:backend-latest
              restart: always
              ports:
                - "5000:5000"
              environment:
                - NODE_ENV=production
                - PORT=5000
                - DB_HOST={{ db_host }}
                - DB_PORT=3306
                - DB_NAME={{ db_name }}
                - DB_USER={{ db_user }}
                - DB_PASSWORD={{ db_password }}
                - DB_DIALECT=mysql
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                interval: 10s
                timeout: 5s
                retries: 5

            frontend:
              image: {{ ecr_registry }}/app-repo:frontend-latest
              restart: always
              ports:
                - "80:3000"
              environment:
                - NODE_ENV=production
              depends_on:
                - backend
        dest: /home/ec2-user/app/docker-compose.yml
        owner: ec2-user
        group: ec2-user
        mode: '0644'

    - name: Pull latest images from ECR
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
        docker pull {{ ecr_registry }}/app-repo:backend-latest
        docker pull {{ ecr_registry }}/app-repo:frontend-latest
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Deploy application with docker-compose
      ansible.builtin.shell: |
        cd /home/ec2-user/app
        docker-compose up -d
      register: deploy_result

    - name: Check deployment status
      ansible.builtin.fail:
        msg: "Deployment failed. Please check logs"
      when: deploy_result.rc != 0

    - name: Verify deployment
      ansible.builtin.shell: docker ps
      register: docker_status

    - name: Print deployment status
      ansible.builtin.debug:
        msg: "{{ docker_status.stdout }}"
